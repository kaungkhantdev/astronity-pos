<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<!-- ===================== HEAD ===================== -->
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="'Astronity POS - ' + ${pageTitle}">Astronity POS</title>
    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Hugeicons -->
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
    <!-- Exo font -->
    <link href="https://fonts.googleapis.com/css2?family=Exo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Exo', sans-serif; }
        button, input, textarea, select, .btn { font-family: inherit; }
    </style>
    <!-- Tailwind Browser (for DaisyUI) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Theme + custom styles -->
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: { DEFAULT: '#e63946', dark: '#c3303b', light: '#f06a76' } } } },
            daisyui: { themes: ["light"] }
        }
    </script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Collapsible sidebar */
        #sidebar { width: 15rem; transition: width .25s ease; }
        #sidebar.collapsed { width: 5rem; }
        #sidebar.collapsed .sb-label,
        #sidebar.collapsed .sb-brand { display: none; }
        .sb-top { display: flex; align-items: center; gap: .75rem; }
        #sidebar.collapsed .sb-top { justify-content: center; padding-left: 0; padding-right: 0; }
        #sidebar.collapsed .sb-toggle { width: 2.25rem; height: 2.25rem; margin-left: auto; margin-right: auto; padding-left: 0; padding-right: 0; justify-content: center; }
        .sb-item { position: relative; display: flex; align-items: center; gap: .75rem; height: 2.75rem; margin: 0 .75rem; padding: 0 .625rem; border-radius: .75rem; color: #6b7280; transition: background-color .15s, color .15s; }
        .sb-item:hover { background: #f3f4f6; color: #111827; }
        .sb-icon { flex: 0 0 1.75rem; height: 1.75rem; display: flex; align-items: center; justify-content: center; transition: background-color .15s; }
        .sb-label { font-size: .875rem; font-weight: 500; white-space: nowrap; }
        .sb-dash { display: none; }
        .sb-item.active { background: rgba(230,57,70,.10); color: #e63946; }
        .sb-item.active .sb-label { font-weight: 600; }
        .sb-item.active .sb-dash { display: block; position: absolute; left: -.75rem; top: 50%; transform: translateY(-50%); height: 1.5rem; width: .25rem; border-radius: 0 9999px 9999px 0; background: #e63946; }
        #sidebar.collapsed .sb-item { justify-content: center; padding-left: 0; padding-right: 0; background: transparent; }
        #sidebar.collapsed .sb-item:hover { background: transparent; }
        #sidebar.collapsed .sb-item:hover .sb-icon { background: #f3f4f6; }
        #sidebar.collapsed .sb-item.active .sb-icon { background: rgba(230,57,70,.10); }
        #sidebar.collapsed .sb-icon { flex-basis: 2.75rem; width: 2.75rem; height: 2.75rem; border-radius: .75rem; }

        /* Toggle switch */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
        .switch input { position: absolute; opacity: 0; width: 0; height: 0; }
        .switch .slider { position: absolute; inset: 0; background: #e5e7eb; border-radius: 9999px; cursor: pointer; transition: background-color .2s; }
        .switch .slider::before { content: ""; position: absolute; left: 2px; top: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; box-shadow: 0 1px 3px rgba(0,0,0,.2); transition: transform .2s; }
        .switch input:checked + .slider { background: #e63946; }
        .switch input:checked + .slider::before { transform: translateX(20px); }
    </style>
</head>

<body>

<!-- ===================== SIDEBAR ===================== -->
<aside th:fragment="sidebar(active)" id="sidebar" class="collapsed bg-white border-r border-gray-100 flex flex-col py-5 shrink-0">
    <!-- Logo + Brand -->
    <div class="sb-top h-10 px-5 mb-4">
        <svg width="36" height="36" viewBox="0 0 48 48" fill="none" class="shrink-0">
            <ellipse cx="24" cy="13" rx="6.5" ry="11" fill="#f06a76"/>
            <ellipse cx="24" cy="13" rx="6.5" ry="11" fill="#e63946" transform="rotate(60 24 24)"/>
            <ellipse cx="24" cy="13" rx="6.5" ry="11" fill="#f06a76" transform="rotate(120 24 24)"/>
            <ellipse cx="24" cy="13" rx="6.5" ry="11" fill="#e63946" transform="rotate(180 24 24)"/>
            <ellipse cx="24" cy="13" rx="6.5" ry="11" fill="#f06a76" transform="rotate(240 24 24)"/>
            <ellipse cx="24" cy="13" rx="6.5" ry="11" fill="#e63946" transform="rotate(300 24 24)"/>
            <circle cx="24" cy="24" r="4.5" fill="#c3303b"/>
        </svg>
        <span class="sb-brand text-lg font-bold text-gray-900 whitespace-nowrap">Astronity</span>
    </div>

    <!-- Toggle -->
    <button id="sbToggle" type="button" class="sb-toggle flex items-center gap-2 h-9 mx-3 mb-3 px-2.5 rounded-full border border-gray-200 text-gray-400 hover:text-gray-700 hover:border-gray-300 transition-colors">
        <span class="w-6 flex justify-center shrink-0"><i id="sbToggleIcon" class="hgi-stroke hgi-arrow-right-double text-base leading-none"></i></span>
        <span class="sb-label text-xs font-medium">Collapse</span>
    </button>

    <!-- Navigation -->
    <nav class="flex flex-col gap-1 flex-1 overflow-y-auto scrollbar-hide">
        <a href="/dashboard" class="sb-item" th:classappend="${active == 'dashboard'} ? 'active' : ''">
            <span class="sb-dash"></span>
            <span class="sb-icon"><i class="hgi-stroke hgi-dashboard-square-02 text-[22px] leading-none"></i></span>
            <span class="sb-label">Dashboard</span>
        </a>
        <a href="/pos" class="sb-item" th:classappend="${active == 'pos'} ? 'active' : ''">
            <span class="sb-dash"></span>
            <span class="sb-icon"><i class="hgi-stroke hgi-shopping-cart-01 text-[22px] leading-none"></i></span>
            <span class="sb-label">POS</span>
        </a>
        <a href="/products" class="sb-item" th:classappend="${active == 'products'} ? 'active' : ''">
            <span class="sb-dash"></span>
            <span class="sb-icon"><i class="hgi-stroke hgi-package text-[22px] leading-none"></i></span>
            <span class="sb-label">Products</span>
        </a>
        <a href="/categories" class="sb-item" th:classappend="${active == 'categories'} ? 'active' : ''">
            <span class="sb-dash"></span>
            <span class="sb-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41 13.42 20.58a2 2 0 0 1-2.83 0L2 12V4a2 2 0 0 1 2-2h8l8.59 8.59a2 2 0 0 1 0 2.82Z"/><circle cx="7.5" cy="7.5" r="1.3"/></svg></span>
            <span class="sb-label">Categories</span>
        </a>
        <a href="/inventory" class="sb-item" th:classappend="${active == 'inventory'} ? 'active' : ''">
            <span class="sb-dash"></span>
            <span class="sb-icon"><i class="hgi-stroke hgi-package-search text-[22px] leading-none"></i></span>
            <span class="sb-label">Inventory</span>
        </a>
        <a href="/sales" class="sb-item" th:classappend="${active == 'sales'} ? 'active' : ''">
            <span class="sb-dash"></span>
            <span class="sb-icon"><i class="hgi-stroke hgi-invoice-03 text-[22px] leading-none"></i></span>
            <span class="sb-label">Sales History</span>
        </a>
        <a href="/customers" class="sb-item" th:classappend="${active == 'customers'} ? 'active' : ''">
            <span class="sb-dash"></span>
            <span class="sb-icon"><i class="hgi-stroke hgi-user-multiple-02 text-[22px] leading-none"></i></span>
            <span class="sb-label">Customers</span>
        </a>
        <a href="/users" class="sb-item" th:classappend="${active == 'users'} ? 'active' : ''">
            <span class="sb-dash"></span>
            <span class="sb-icon"><i class="hgi-stroke hgi-user-settings-01 text-[22px] leading-none"></i></span>
            <span class="sb-label">Users</span>
        </a>
        <a href="/reports" class="sb-item" th:classappend="${active == 'reports'} ? 'active' : ''">
            <span class="sb-dash"></span>
            <span class="sb-icon"><i class="hgi-stroke hgi-analytics-up text-[22px] leading-none"></i></span>
            <span class="sb-label">Reports</span>
        </a>
    </nav>

    <!-- Bottom -->
    <div class="flex flex-col gap-1 mt-auto">
        <a href="/settings" class="sb-item" th:classappend="${active == 'settings'} ? 'active' : ''">
            <span class="sb-dash"></span>
            <span class="sb-icon"><i class="hgi-stroke hgi-settings-02 text-[22px] leading-none"></i></span>
            <span class="sb-label">Settings</span>
        </a>
        <a href="/logout" class="sb-item">
            <span class="sb-dash"></span>
            <span class="sb-icon"><i class="hgi-stroke hgi-logout-02 text-[22px] leading-none"></i></span>
            <span class="sb-label">Logout</span>
        </a>
    </div>
</aside>

<!-- ===================== COMMON SCRIPTS ===================== -->
<th:block th:fragment="scripts">
    <script>
        // ---- Modals ----
        function closeAllModals() {
            document.querySelectorAll('.app-modal').forEach(function (m) { m.classList.add('hidden'); });
            document.body.style.overflow = '';
        }
        document.querySelectorAll('[data-open]').forEach(function (btn) {
            btn.addEventListener('click', function () {
                const id = btn.getAttribute('data-open');
                const modal = document.getElementById(id);
                if (!modal) return;
                // Copy any data-* attributes into matching [data-fill="key"] fields inside the modal
                Array.from(btn.attributes).forEach(function (attr) {
                    if (attr.name.startsWith('data-') && attr.name !== 'data-open') {
                        const key = attr.name.replace('data-', '');
                        const target = modal.querySelector('[data-fill="' + key + '"]');
                        if (target) {
                            if (target.type === 'checkbox') target.checked = attr.value === 'true';
                            else if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.tagName === 'SELECT') target.value = attr.value;
                            else target.textContent = attr.value;
                        }
                    }
                });
                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            });
        });
        document.querySelectorAll('[data-close]').forEach(function (el) {
            el.addEventListener('click', closeAllModals);
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeAllModals();
        });

        // ---- Sidebar collapse toggle ----
        (function () {
            const sb = document.getElementById('sidebar');
            const btn = document.getElementById('sbToggle');
            const icon = document.getElementById('sbToggleIcon');
            if (btn) btn.addEventListener('click', function () {
                const collapsed = sb.classList.toggle('collapsed');
                icon.classList.toggle('hgi-arrow-right-double', collapsed);
                icon.classList.toggle('hgi-arrow-left-double', !collapsed);
            });
        })();
    </script>
</th:block>

</body>
</html>
