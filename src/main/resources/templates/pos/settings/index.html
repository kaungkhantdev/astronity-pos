<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="~{pos/fragments :: head('Settings')}"></head>
<body class="h-screen bg-gray-50 overflow-hidden">

<div class="flex h-screen overflow-hidden">

    <aside th:replace="~{pos/fragments :: sidebar('settings')}"></aside>

    <main class="flex-1 overflow-y-auto">
        <div class="p-6 lg:p-8 max-w-[1000px] mx-auto">

            <div class="mb-6">
                <h1 class="text-2xl font-bold text-gray-900">Settings</h1>
                <p class="text-sm text-gray-500 mt-1">Configure your shop, taxes, receipts and payments.</p>
            </div>

            <form th:action="@{/settings/update}" method="post" class="space-y-6">

                <!-- Shop details -->
                <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                    <div class="flex items-center gap-3 px-6 py-4 border-b border-gray-100">
                        <span class="w-9 h-9 rounded-xl bg-[#e63946]/10 text-[#e63946] flex items-center justify-center"><i class="hgi-stroke hgi-store-01"></i></span>
                        <h2 class="font-bold text-gray-900">Shop Details</h2>
                    </div>
                    <div class="p-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="sm:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Shop Name</label>
                            <input type="text" name="shopName" value="Astronity POS" class="w-full h-11 px-4 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-[#f06a76] focus:bg-white text-sm transition-colors"/>
                        </div>
                        <div class="sm:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Address</label>
                            <textarea name="address" rows="2" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-[#f06a76] focus:bg-white text-sm transition-colors resize-none">123 Sukhumvit Rd, Bangkok 10110</textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Phone</label>
                            <input type="tel" name="phone" value="02-123-4567" class="w-full h-11 px-4 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-[#f06a76] focus:bg-white text-sm transition-colors"/>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Currency</label>
                            <select name="currency" class="w-full h-11 px-4 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-[#f06a76] focus:bg-white text-sm transition-colors">
                                <option>THB (฿)</option><option>USD ($)</option><option>EUR (€)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Tax -->
                <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                    <div class="flex items-center gap-3 px-6 py-4 border-b border-gray-100">
                        <span class="w-9 h-9 rounded-xl bg-[#e63946]/10 text-[#e63946] flex items-center justify-center"><i class="hgi-stroke hgi-percent-circle"></i></span>
                        <h2 class="font-bold text-gray-900">Tax Configuration</h2>
                    </div>
                    <div class="p-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Tax Rate (%)</label>
                            <input type="number" name="taxRate" value="7" step="0.01" class="w-full h-11 px-4 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-[#f06a76] focus:bg-white text-sm transition-colors"/>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Tax ID</label>
                            <input type="text" name="taxId" value="0105551234567" class="w-full h-11 px-4 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-[#f06a76] focus:bg-white text-sm transition-colors"/>
                        </div>
                        <div class="sm:col-span-2 flex items-center justify-between pt-1">
                            <div><p class="text-sm font-medium text-gray-700">Prices include tax</p><p class="text-xs text-gray-400">Show tax-inclusive prices on the POS</p></div>
                            <label class="switch"><input type="checkbox" name="taxInclusive"/><span class="slider"></span></label>
                        </div>
                    </div>
                </div>

                <!-- Receipt -->
                <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                    <div class="flex items-center gap-3 px-6 py-4 border-b border-gray-100">
                        <span class="w-9 h-9 rounded-xl bg-[#e63946]/10 text-[#e63946] flex items-center justify-center"><i class="hgi-stroke hgi-invoice-03"></i></span>
                        <h2 class="font-bold text-gray-900">Receipt</h2>
                    </div>
                    <div class="p-6 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Header Text</label>
                            <input type="text" name="receiptHeader" value="Astronity POS" class="w-full h-11 px-4 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-[#f06a76] focus:bg-white text-sm transition-colors"/>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Footer Text</label>
                            <input type="text" name="receiptFooter" value="Thank you — see you again!" class="w-full h-11 px-4 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:border-[#f06a76] focus:bg-white text-sm transition-colors"/>
                        </div>
                    </div>
                </div>

                <!-- Payment methods -->
                <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                    <div class="flex items-center gap-3 px-6 py-4 border-b border-gray-100">
                        <span class="w-9 h-9 rounded-xl bg-[#e63946]/10 text-[#e63946] flex items-center justify-center"><i class="hgi-stroke hgi-credit-card"></i></span>
                        <h2 class="font-bold text-gray-900">Payment Methods</h2>
                    </div>
                    <div class="p-6 divide-y divide-gray-100">
                        <div class="flex items-center justify-between py-3">
                            <div class="flex items-center gap-3"><i class="hgi-stroke hgi-money-03 text-gray-500"></i><span class="text-sm font-medium text-gray-700">Cash</span></div>
                            <label class="switch"><input type="checkbox" name="payCash" checked/><span class="slider"></span></label>
                        </div>
                        <div class="flex items-center justify-between py-3">
                            <div class="flex items-center gap-3"><i class="hgi-stroke hgi-credit-card text-gray-500"></i><span class="text-sm font-medium text-gray-700">Credit / Debit Card</span></div>
                            <label class="switch"><input type="checkbox" name="payCard" checked/><span class="slider"></span></label>
                        </div>
                        <div class="flex items-center justify-between py-3">
                            <div class="flex items-center gap-3"><i class="hgi-stroke hgi-qr-code text-gray-500"></i><span class="text-sm font-medium text-gray-700">QR / PromptPay</span></div>
                            <label class="switch"><input type="checkbox" name="payQr" checked/><span class="slider"></span></label>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end gap-3">
                    <button type="reset" class="px-4 h-11 rounded-xl border border-gray-200 text-gray-700 text-sm font-medium hover:bg-gray-50">Reset</button>
                    <button type="submit" class="px-5 h-11 rounded-xl bg-[#e63946] hover:bg-[#c3303b] text-white text-sm font-semibold transition-colors">Save Settings</button>
                </div>

            </form>

        </div>
    </main>

</div>

<th:block th:replace="~{pos/fragments :: scripts}"></th:block>
</body>
</html>
